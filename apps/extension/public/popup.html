<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Browser Persona</title>
    <style>
      body { font-family: system-ui, sans-serif; min-width: 280px; padding: 12px; margin: 0; }
      button { width: 100%; padding: 8px; margin-top: 8px; cursor: pointer; }
      .status { font-size: 12px; color: #555; margin-top: 8px; }
      .api { font-size: 12px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; }
      .api.ok { color: #166534; }
      .api.err { color: #991b1b; }
      label { display: block; font-size: 12px; color: #555; margin-top: 8px; }
      input, select { width: 100%; box-sizing: border-box; margin-top: 4px; padding: 6px 8px; font: inherit; }
      .section { margin-top: 14px; padding-top: 12px; border-top: 1px solid #eee; }
      .cap-item { font-size: 12px; margin-top: 8px; padding: 8px; background: #f8fafc; border-radius: 6px; }
      .cap-item button { margin-top: 6px; }
      .muted { color: #64748b; font-size: 11px; }
    </style>
  </head>
  <body>
    <strong>Recording</strong>
    <button id="toggle">Pause</button>
    <div class="status" id="status">Active</div>

    <label>
      Capture mode
      <select id="captureMode">
        <option value="full">Full (rrweb replay)</option>
        <option value="semantic">Semantic only (compact)</option>
      </select>
    </label>

    <div class="api" id="apiStatus">Checking API…</div>
    <label>
      API URL
      <input id="apiBase" type="url" placeholder="http://localhost:3001" />
    </label>

    <div class="section">
      <strong>Run saved workflow</strong>
      <p class="muted">Triggers execution on the API host (Playwright).</p>
      <div id="capabilities">Loading…</div>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
