services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: persona
      POSTGRES_PASSWORD: persona
      POSTGRES_DB: browser_persona
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/seed-dev.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U persona -d browser_persona"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://persona:persona@db:5432/browser_persona
      PORT: "3001"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      DEV_USER_ID: ${DEV_USER_ID:-00000000-0000-0000-0000-000000000001}
      PIPELINE_IDLE_MS: ${PIPELINE_IDLE_MS:-90000}
      PIPELINE_INTERVAL_MS: ${PIPELINE_INTERVAL_MS:-60000}
      PIPELINE_AUTO_RUN: ${PIPELINE_AUTO_RUN:-true}
      INTENT_EXTRACT_AUTO: ${INTENT_EXTRACT_AUTO:-true}
      INTENT_EXTRACT_SKIP_NON_AUTOMATABLE: ${INTENT_EXTRACT_SKIP_NON_AUTOMATABLE:-true}
      INTENT_PROMPT_VERSION: ${INTENT_PROMPT_VERSION:-v1}
      INTENT_RUN_MAX_PLAN_CALLS_PER_TASK: ${INTENT_RUN_MAX_PLAN_CALLS_PER_TASK:-3}
      INTENT_DOM_SNAPSHOT_MAX_CHARS: ${INTENT_DOM_SNAPSHOT_MAX_CHARS:-10000}
      INTENT_AUTO_APPROVE_CONFIDENCE: ${INTENT_AUTO_APPROVE_CONFIDENCE:-0.85}
      INTENT_DEDUP_SIMILARITY_HIGH: ${INTENT_DEDUP_SIMILARITY_HIGH:-0.92}
      INTENT_DEDUP_SIMILARITY_LOW: ${INTENT_DEDUP_SIMILARITY_LOW:-0.80}
      INTENT_DEDUP_LLM_CONFIRM: ${INTENT_DEDUP_LLM_CONFIRM:-true}
      INTENT_AUTO_APPROVE_DOMAIN_BLOCKLIST: ${INTENT_AUTO_APPROVE_DOMAIN_BLOCKLIST:-}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      RRWEB_RETENTION_DAYS: ${RRWEB_RETENTION_DAYS:-14}
      INGEST_BODY_LIMIT_MB: ${INGEST_BODY_LIMIT_MB:-25}
      DOCKER_CONTAINER: "true"
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-true}
      PLAYWRIGHT_SLOW_MO: ${PLAYWRIGHT_SLOW_MO:-50}
      PLAYWRIGHT_TIMEOUT_MS: ${PLAYWRIGHT_TIMEOUT_MS:-30000}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:3001}
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
